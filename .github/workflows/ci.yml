name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DATABASE_URL: file:./test.db
  NEXTAUTH_URL: http://localhost:3000
  NEXTAUTH_SECRET: test-secret-for-ci
  ALLOW_SEED_DATA: "false"

jobs:
  lint-and-type-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Create SQLite database
        run: npx prisma db push --skip-generate

      - name: Lint
        run: npx eslint --no-error-on-unmatched-pattern 'src/**/*.ts' 'src/**/*.tsx'

      - name: Type check
        run: npx tsc --noEmit

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Create SQLite database
        run: npx prisma db push --skip-generate

      - name: Run tests
        run: npx vitest run
