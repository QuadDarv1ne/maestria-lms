name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DATABASE_URL: file:./test.db
  NEXTAUTH_URL: http://localhost:3000
  NEXTAUTH_SECRET: test-secret-for-ci
  ALLOW_SEED_DATA: "false"

jobs:
  lint-and-type-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Generate Prisma client
        run: bunx prisma generate

      - name: Create SQLite database
        run: bunx prisma db push --skip-generate

      - name: Lint
        run: bunx eslint --no-error-on-unmatched-pattern 'src/**/*.ts' 'src/**/*.tsx'

      - name: Type check
        run: bunx tsc --noEmit

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Generate Prisma client
        run: bunx prisma generate

      - name: Create SQLite database
        run: bunx prisma db push --skip-generate

      - name: Run tests
        run: bunx vitest run
